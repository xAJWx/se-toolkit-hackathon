services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - remindme-network
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-remindme}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-remindme_password}
      - POSTGRES_DB=${POSTGRES_DB:-remindme}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remindme} -d ${POSTGRES_DB:-remindme}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - remindme-network
    environment:
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required}
      - POSTGRES_USER=${POSTGRES_USER:-remindme}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-remindme_password}
      - POSTGRES_DB=${POSTGRES_DB:-remindme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  remindme-network:
    name: remindme-network
    attachable: true
